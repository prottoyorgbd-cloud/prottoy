<!-- Clear localStorage - এই page টা ব্রাউজারে খুলুন একবার, তারপর delete করুন -->
<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>ডেটা পরিষ্কার - প্রত্যয়</title>
  <style>
    body {
      font-family: 'Noto Sans Bengali', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      margin: 0;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 500px;
    }
    h1 { color: #087b3e; margin-bottom: 10px; }
    p { color: #666; line-height: 1.6; margin: 15px 0; }
    button {
      background: #dc3545;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover { background: #c82333; }
    .success {
      background: #d4edda;
      color: #155724;
      padding: 15px;
      border-radius: 6px;
      margin: 20px 0;
      display: none;
    }
    .info {
      background: #e7f3ff;
      color: #0056b3;
      padding: 15px;
      border-radius: 6px;
      margin: 20px 0;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗑️ ডেটা পরিষ্কার টুল</h1>
    <p>localStorage থেকে সব test donor data মুছে ফেলতে নিচের বাটন ক্লিক করুন।</p>
    
    <div class="info">
      <strong>এটা কী করবে:</strong>
      <ul>
        <li>✅ সব test রক্তদাতা ডেটা মুছে ফেলবে</li>
        <li>✅ লাইভ Firebase ডেটা মুছবে না</li>
        <li>✅ শুধু localStorage কে clean করবে</li>
      </ul>
    </div>

    <button onclick="clearDonorData()">সব Donor ডেটা মুছুন</button>
    <button onclick="clearAllData()">সব ডেটা মুছুন (লাইন + যোগাযোগ)</button>
    <button onclick="location.href='index.html'">ফিরে যান</button>

    <div class="success" id="success">✅ ডেটা সফলভাবে মুছে ফেলা হয়েছে!</div>
  </div>

  <script>
    function clearDonorData() {
      localStorage.removeItem("prottoy-donors");
      console.log("Donors cleared");
      showSuccess();
    }

    function clearAllData() {
      localStorage.removeItem("prottoy-donors");
      localStorage.removeItem("prottoy-users");
      localStorage.removeItem("prottoy-session");
      localStorage.removeItem("prottoy-receipt-serial");
      console.log("All data cleared");
      showSuccess();
    }

    function showSuccess() {
      const msg = document.getElementById("success");
      msg.style.display = "block";
      setTimeout(() => {
        location.href = "index.html";
      }, 2000);
    }
  </script>
</body>
</html>
